<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="resume">
    <div class="header">
      <div>
        <h1 id="name">Your Name</h1>
        <p class="subtitle" id="title">Job Title</p>
      </div>
      <div class="contact">
        <div class="contact-item"><strong>Email</strong><p id="email"></p></div>
        <div class="contact-item"><strong>Phone</strong><p id="phone">000-000-0000</p></div>
        <div class="contact-item"><strong>Linkeden</strong><p id="website">https://example.com</p></div>
        <div class="contact-item"><strong>Location</strong><p id="location">City, Country</p></div>
      </div>
    </div>

    <div class="section">
      <h2>Summary</h2>
      <p id="summary">A short summary that introduces your experience, skills, and career goals.</p>
    </div>

    <div class="section">
      <h2>Experience</h2>
      <div id="experience"></div>
    </div>

    <div class="section">
      <h2>Education</h2>
      <div id="education"></div>
    </div>

    <div class="section">
      <h2>Skills</h2>
      <p id="skills">Skill1, Skill2, Skill3</p>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
